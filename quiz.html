<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
    integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>About EarthQuiz</title>
</head>

<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold fs-2" href="index.html">Earth<span class="navbar-brandColor">Quiz</span></a>

        <!-- Mobile Menu Button -->
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas"
          data-bs-target="#mobileMenu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Desktop Menu -->
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto gap-3 d-none d-lg-flex">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link nav-active" href="quizInstructions.html">Quiz</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Offcanvas Sidebar -->
  <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="mobileMenu">
    <div class="offcanvas-header">
      <a class="navbar-brand fw-bold fs-2" href="#">Earth<span class="navbar-brandColor">Quiz</span></a>

      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas">
      </button>
    </div>

    <div class="offcanvas-body">
      <ul class="navbar-nav">
        <li class="nav-item mb-2">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" href="about.html">About</a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link nav-active" href="quizInstructions.html">Quiz</a>
        </li>
      </ul>
    </div>
  </div>

  <main>
    <section>
      <div class="container my-5 py-5 text-white">
        <p id="progress-bar"></p>
        <h4 id="question"></h4>
        <p id="answer"></p>
        <div id="options"></div>
        <button class="start-btn my-5" id="previous-btn">Previous</button>
        <button class="start-btn my-5" id="next-btn">Next</button>
        <button class="start-btn my-5" id="playagain-btn">Play Again</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
